<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scène · Live Playlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <link rel="icon" type="image/ico" href="logo.ico">
    <style>
        :root {
            --bg:      #05050a;
            --surface: rgba(14, 14, 26, 0.7);
            --border:  rgba(255, 255, 255, 0.1);
            --green:   #00ff88;
            --blue:    #00d4ff;
            --orange:  #ff9040;
            --purple:  #9d4edd;
            --text:    #e0e0f0;
            --subtext: #8888b0;
            --yellow:  #ffcc00; /* Ajout couleur 2ème passage */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Space Mono', monospace;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ── FOND ANIMÉ MESH ── */
        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(0, 212, 255, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(157, 78, 221, 0.15) 0px, transparent 50%),
                radial-gradient(at 50% 100%, rgba(0, 255, 136, 0.1) 0px, transparent 50%);
            filter: blur(100px);
            animation: meshMove 20s ease infinite alternate;
        }

        @keyframes meshMove {
            0% { transform: scale(1); }
            100% { transform: scale(1.2) rotate(2deg); }
        }

        body::after {
            content: '';
            position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.02));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none; z-index: 999;
        }

        /* ── SYSTEME QR CODE DYNAMIQUE ── */
        #qr-container {
            position: fixed;
            z-index: 1000;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* État Central (Vide) */
        .qr-center {
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 380px; padding: 40px; border-radius: 30px;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.2);
        }
        .qr-center img { width: 100%; border-radius: 15px; }
        .qr-center .qr-msg { margin-top: 20px; font-size: 1.2rem; font-weight: 700; color: var(--blue); text-align: center; }

        /* État Coin (Rempli) */
        .qr-corner {
            top: 35px; right: 40px;
            width: 110px; padding: 10px; border-radius: 15px;
            transform: translate(0, 0);
        }
        .qr-corner img { width: 100%; border-radius: 5px; }
        .qr-corner .qr-msg { display: none; }

        /* ── SECTION NEXT ── */
        #next-section {
            flex-shrink: 0;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 40px 60px;
            display: flex; align-items: center; gap: 30px;
            position: relative;
            overflow: hidden;
        }

        #next-section::after {
            content: '';
            position: absolute; bottom: 0; left: 0;
            height: 3px; width: 100%;
            background: linear-gradient(90deg, transparent, var(--blue), var(--green), transparent);
            background-size: 200% 100%;
            animation: flow 3s linear infinite;
        }

        @keyframes flow { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .next-dot {
            width: 15px; height: 15px; border-radius: 50%;
            background: var(--blue);
            box-shadow: 0 0 20px var(--blue), 0 0 40px var(--blue);
            animation: pulseGlow 1.5s ease-in-out infinite;
        }

        @keyframes pulseGlow { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.5; } }

        .next-label {
            font-size: 14px; font-weight: 700; letter-spacing: 0.5em;
            text-transform: uppercase; color: var(--blue);
        }

        .next-title {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 800; color: #fff; line-height: 1;
        }

        .next-artist {
            font-size: clamp(1rem, 1.8vw, 1.5rem);
            color: var(--blue); opacity: 0.8;
            margin-top: 10px;
        }

        /* ── QUEUE ── */
        #queue-section {
            flex: 1; padding: 40px 60px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .track-row {
            display: flex; align-items: center; gap: 25px;
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px; padding: 20px 30px;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* STYLE DEUXIÈME PASSAGE */
        .track-row.pass-2 {
            border-left: 6px solid var(--yellow);
            background: rgba(255, 204, 0, 0.05);
        }
        .track-row.pass-2 .votes-badge { color: var(--yellow); border-color: rgba(255, 204, 0, 0.2); }

        .track-rank { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; width: 50px; }
        .rank-1 { color: var(--green); }
        .rank-2 { color: var(--blue); }
        .rank-3 { color: var(--purple); }

        .track-title { font-family: 'Syne', sans-serif; font-size: clamp(1.2rem, 2.2vw, 1.8rem); font-weight: 700; color: #fff; }
        .track-artist { color: var(--subtext); font-size: 1rem; margin-top: 4px; }

        .votes-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 10px 20px; border-radius: 12px;
            font-weight: 700; font-size: 1.4rem; color: var(--green);
        }

        .next-empty { font-family: 'Syne', sans-serif; font-size: 2.5rem; color: var(--subtext); opacity: 0.3; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

    </style>
</head>
<body>

    <div class="mesh-bg"></div>

    <div id="qr-container" class="qr-center">
        <img src="logo.png" alt="QR Code">
        <div class="qr-msg">SCANNE POUR VOTER</div>
    </div>

    <div id="next-section">
        <div class="next-dot"></div>
        <div>
            <div class="next-label">À suivre</div>
            <div id="next-info">
                <div class="next-empty">En attente…</div>
            </div>
        </div>
    </div>

    <div id="queue-section">
        <div id="queue-list"></div>
    </div>

    <script>
        const socket = io();

        socket.on('init', ({ pending, nextTrack }) => {
            renderNext(nextTrack);
            renderQueue(pending);
        });

        socket.on('updateList', (tracks) => {
            const next = tracks.find(t => t.status === 'next') || null;
            renderNext(next);
            renderQueue(tracks);
        });

        socket.on('nextUpdate', renderNext);

        function renderNext(track) {
            const el = document.getElementById('next-info');
            if (track) {
                el.innerHTML = `
                    <div class="next-title">${esc(track.title)}</div>
                    <div class="next-artist">${esc(track.artist)}</div>
                `;
            } else {
                el.innerHTML = '<div class="next-empty">Préparez vos votes…</div>';
            }
        }

        function renderQueue(tracks) {
            const list = document.getElementById('queue-list');
            const qr = document.getElementById('qr-container');
            const pending = tracks.filter(t => t.status !== 'next');

            // Logique QR Code
            if (pending.length === 0) {
                qr.className = "qr-center";
                list.innerHTML = "";
                return;
            } else {
                qr.className = "qr-corner";
            }

            list.innerHTML = pending.slice(0, 5).map((t, i) => {
                const rank = i + 1;
                const emojis = ['🥇', '🥈', '🥉'];
                const rankDisplay = rank <= 3 ? emojis[rank-1] : `#${rank}`;
                
                return `
                <div class="track-row ${t.pass === 2 ? 'pass-2' : ''}" style="animation: slideIn 0.5s ease backwards; animation-delay:${i * 100}ms">
                    <span class="track-rank ${rank <= 3 ? `rank-${rank}` : ''}">${rankDisplay}</span>
                    <div style="flex:1">
                        <div class="track-title">${esc(t.title)}</div>
                        <div class="track-artist">${esc(t.artist)}</div>
                    </div>
                    <div class="votes-badge">${t.votes} <span style="font-size:0.8rem">VOTES</span></div>
                </div>`;
            }).join('');
        }

        function esc(str) {
            return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
    </script>
</body>
</html>
