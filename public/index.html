<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Manager · Live Playlist</title>
    
    <link rel="icon" type="image/ico" href="logo.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg:      #09090f;
            --surface: #12121c;
            --border:  #1e1e30;
            --accent:  #c8ff3e;
            --accent2: #ff3eaa;
            --orange:  #ff9040;
            --blue:    #66aaff;
            --muted:   #3a3a50;
            --text:    #e8e8f0;
            --subtext: #6b6b85;
            --card-h:  #16162a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 999; opacity: .6;
        }
        .glow { position: fixed; width: 500px; height: 500px; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; opacity: .12; }
        .glow-1 { background: var(--accent);  top: -150px; right: -100px; }
        .glow-2 { background: var(--accent2); bottom: 100px; left: -150px; }

        header { position: relative; z-index: 10; padding: 32px 20px 0; text-align: center; }
        .logo-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 100px; padding: 6px 14px 6px 8px;
            font-size: 12px; font-weight: 500; color: var(--subtext);
            margin-bottom: 20px; letter-spacing: .05em;
        }
        .logo-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent); box-shadow: 0 0 8px var(--accent);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(.85)} }

        h1 { font-family: 'Syne', sans-serif; font-size: clamp(32px,8vw,52px); font-weight: 800; letter-spacing: -.02em; line-height: 1; }
        h1 span { color: var(--accent); }
        .subtitle { color: var(--subtext); font-size: 14px; margin-top: 8px; letter-spacing: .02em; }

        /* Next track banner */
        #next-banner {
            display: none;
            max-width: 600px; margin: 20px auto 0;
            background: rgba(102,170,255,.08);
            border: 1px solid rgba(102,170,255,.3);
            border-radius: 12px; padding: 14px 20px;
            text-align: center;
        }
        #next-banner.show { display: block; }
        .next-banner-label {
            font-size: 10px; letter-spacing: .15em; text-transform: uppercase;
            color: var(--blue); margin-bottom: 6px;
        }
        .next-banner-label::before {
            content: '';
            display: inline-block; width: 6px; height: 6px;
            border-radius: 50%; background: var(--blue);
            box-shadow: 0 0 6px var(--blue);
            margin-right: 8px; vertical-align: middle;
            animation: blink 1.2s step-end infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
        .next-banner-title {
            font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800;
            color: #fff;
        }
        .next-banner-artist { font-size: 12px; color: var(--subtext); margin-top: 3px; }

        .stats-bar {
            display: flex; justify-content: center; gap: 32px;
            margin: 28px auto 0; padding: 0 20px;
        }
        .stat { text-align: center; }
        .stat-value { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: var(--accent); }
        .stat-label { font-size: 11px; color: var(--subtext); letter-spacing: .08em; text-transform: uppercase; }
        .stat-divider { width: 1px; background: var(--border); }

        /* Timers bar */
        .timers-bar {
            display: flex; justify-content: center; gap: 12px;
            max-width: 600px; margin: 16px auto 0; padding: 0 16px;
            position: relative; z-index: 10;
        }
        .timer-box {
            flex: 1; background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px 14px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .timer-box.active { border-color: rgba(200,255,62,.3); background: rgba(200,255,62,.04); }
        .timer-label { font-size: 11px; color: var(--subtext); letter-spacing: .04em; }
        .timer-value {
            font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800;
            color: var(--accent);
        }
        .timer-box.active .timer-value { color: var(--accent2); }
        .timer-sub { font-size: 10px; color: var(--subtext); }

        main {
            position: relative; z-index: 10;
            max-width: 600px; margin: 20px auto 0;
            padding: 0 16px 160px;
        }
        .section-label {
            font-size: 11px; font-weight: 700; letter-spacing: .12em;
            text-transform: uppercase; color: var(--subtext);
            margin-bottom: 14px; padding-left: 4px;
        }

        /* Track card */
        .track-card {
            display: flex; align-items: center; gap: 14px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
            transition: border-color .2s, transform .15s, background .2s;
            animation: slideIn .3s ease both;
        }
        @keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .track-card:hover { border-color: var(--muted); background: var(--card-h); transform: translateY(-1px); }
        .track-card.second-pass {
            border-color: rgba(255,144,64,.35);
            background: rgba(255,144,64,.07);
        }
        .track-card.second-pass:hover {
            border-color: rgba(255,144,64,.55);
            background: rgba(255,144,64,.12);
        }

        /* Track marquée NEXT : pas de bouton vote */
        .track-card.is-next {
            border-color: rgba(102,170,255,.4);
            background: rgba(102,170,255,.06);
        }
        .track-card.is-next:hover { border-color: rgba(102,170,255,.5); }

        .track-rank { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 800; color: var(--muted); width: 22px; text-align: center; flex-shrink: 0; }
        .rank-1 { color: var(--accent); }
        .rank-2 { color: #b8b0ff; }
        .rank-3 { color: #ff9966; }

        .track-info { flex: 1; min-width: 0; }
        .track-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-meta { display: flex; align-items: center; gap: 8px; margin-top: 3px; }
        .track-artist { font-size: 12px; color: var(--subtext); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .next-badge {
            font-size: 10px; font-weight: 700; letter-spacing: .06em;
            color: var(--blue); background: rgba(102,170,255,.15);
            border: 1px solid rgba(102,170,255,.3);
            border-radius: 4px; padding: 2px 8px; white-space: nowrap; flex-shrink: 0;
        }

        /* Vote button */
        .vote-btn {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 10px; padding: 8px 12px; cursor: pointer;
            transition: all .2s; min-width: 52px; flex-shrink: 0; position: relative;
        }
        .vote-btn:hover { border-color: var(--accent); background: rgba(200,255,62,.07); }
        .vote-btn.voted { border-color: var(--accent); background: rgba(200,255,62,.12); }
        .vote-btn.voted:hover { border-color: var(--accent2); background: rgba(255,62,170,.08); }
        .vote-icon { font-size: 14px; line-height: 1; transition: transform .15s; }
        .vote-btn:hover .vote-icon { transform: scale(1.2); }
        .vote-count { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800; color: var(--text); }
        .vote-btn.voted .vote-count { color: var(--accent); }
        .vote-btn.voted::after {
            content: 'Annuler'; position: absolute; top: -24px; left: 50%;
            transform: translateX(-50%); font-size: 10px; background: var(--accent2);
            color: #fff; border-radius: 4px; padding: 2px 6px; white-space: nowrap;
            opacity: 0; pointer-events: none; transition: opacity .15s;
        }
        .vote-btn.voted:hover::after { opacity: 1; }

        /* Votes counter on next track (no button) */
        .votes-display {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            min-width: 52px; flex-shrink: 0;
        }
        .votes-display .vote-count { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800; color: var(--blue); }
        .votes-display .vote-icon { font-size: 14px; color: var(--blue); opacity: .5; }

        .empty-state { text-align: center; padding: 48px 0; color: var(--subtext); }
        .empty-icon { font-size: 40px; margin-bottom: 12px; }
        .empty-text { font-size: 14px; }

        #toast {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 100px; padding: 12px 24px;
            font-size: 14px; font-weight: 500; z-index: 1000;
            transition: transform .3s cubic-bezier(.34,1.56,.64,1);
            white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,.4);
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
        #toast.error   { border-color: var(--accent2); color: var(--accent2); }
        #toast.success { border-color: var(--accent);  color: var(--accent); }
        #toast.info    { border-color: #b8b0ff; color: #b8b0ff; }
        #toast.orange  { border-color: var(--orange); color: var(--orange); }

        /* Input bar */
        .input-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            z-index: 100; padding: 16px;
            background: linear-gradient(to top, var(--bg) 60%, transparent);
        }
        .input-inner {
            max-width: 600px; margin: 0 auto;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 12px 12px 12px 16px;
            display: flex; gap: 10px; align-items: center;
            box-shadow: 0 -8px 40px rgba(0,0,0,.5);
        }
        .input-fields { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .input-inner input {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 9px 12px; color: var(--text);
            font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none;
            transition: border-color .2s; width: 100%;
        }
        .input-inner input:focus { border-color: var(--accent); }
        .input-inner input::placeholder { color: var(--muted); }
        .send-btn {
            background: var(--accent); color: #09090f; border: none;
            border-radius: 10px; width: 44px; height: 44px; font-size: 20px;
            cursor: pointer; flex-shrink: 0; transition: transform .15s, filter .15s;
            display: flex; align-items: center; justify-content: center;
        }
        .send-btn:hover  { filter: brightness(1.1); transform: scale(1.05); }
        .send-btn:active { transform: scale(.95); }

        /* --- SECTION RESPONSIVE AJOUTÉE --- */
        @media (max-width: 480px) {
            header { padding: 24px 15px 0; }
            h1 { font-size: 38px; }
            
            .stats-bar { gap: 15px; margin: 20px auto 0; }
            .stat-value { font-size: 20px; }
            .stat-label { font-size: 9px; }

            .timers-bar { gap: 8px; }
            .timer-box { padding: 10px; }
            .timer-label { font-size: 9px; }
            .timer-value { font-size: 14px; }

            /* Empiler les champs de saisie sur mobile pour plus d'espace */
            .input-fields { grid-template-columns: 1fr; gap: 6px; }
            .input-inner { padding: 10px; }
            .input-bar { padding: 10px; }
            
            /* Ajuster la taille des cartes */
            .track-card { padding: 12px; gap: 10px; }
            .track-title { font-size: 14px; }
            .vote-btn { padding: 6px 10px; min-width: 48px; }
            
            /* Toast plus compact */
            #toast { width: 90%; font-size: 12px; padding: 10px 15px; text-align: center; }
        }

        /* Pour les très petits écrans (iPhone SE, etc.) */
        @media (max-width: 360px) {
            .timers-bar { flex-direction: column; }
            .stats-bar { justify-content: space-around; gap: 5px; }
            .stat-divider { display: none; }
        }
    </style>
</head>
<body>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div id="toast"></div>

<header>
    <div class="logo-badge"><span class="logo-dot"></span>EN DIRECT</div>
    <h1>LIVE<br><span>PLAYLIST</span></h1>
    <p class="subtitle">Vote pour le prochain son</p>

    <div id="next-banner">
        <div class="next-banner-label">Prochain morceau</div>
        <div class="next-banner-title" id="next-title">—</div>
        <div class="next-banner-artist" id="next-artist"></div>
    </div>

    <div class="stats-bar">
        <div class="stat">
            <div class="stat-value" id="stat-pending">—</div>
            <div class="stat-label">En attente</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
            <div class="stat-value" id="stat-votes">—</div>
            <div class="stat-label">Votes</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
            <div class="stat-value" id="stat-played">—</div>
            <div class="stat-label">Joués</div>
        </div>
    </div>
</header>

<div class="timers-bar">
    <div class="timer-box" id="timer-propose">
        <div class="timer-label">⏱ Proposer un son</div>
        <div class="timer-value" id="timer-propose-val">Disponible</div>
        <div class="timer-sub" id="timer-propose-sub"></div>
    </div>
    <div class="timer-box" id="timer-vote">
        <div class="timer-label">🗳 Voter</div>
        <div class="timer-value" id="timer-vote-val">Disponible</div>
        <div class="timer-sub" id="timer-vote-sub"></div>
    </div>
</div>

<main>
    <div class="section-label">🔥 Les demandes</div>
    <div id="playlist"></div>
</main>

<div class="input-bar">
    <div class="input-inner">
        <div class="input-fields">
            <input id="title"  placeholder="Titre du son…" maxlength="100" autocomplete="off">
            <input id="artist" placeholder="Artiste…"      maxlength="100" autocomplete="off">
        </div>
        <button class="send-btn" onclick="propose()" title="Proposer">＋</button>
    </div>
</div>

<script>
    const socket = io();
    const deviceId = localStorage.getItem('deviceId') || Math.random().toString(36).slice(2);
    localStorage.setItem('deviceId', deviceId);

    let votedTracks = JSON.parse(localStorage.getItem('votedTracks') || '[]');
    let playedCount = 0;
    let settings = { cooldownPropose: 10 * 60 * 1000, cooldownVote: 2 * 60 * 1000 };
    let lastPropose = +localStorage.getItem('lastPropose') || 0;
    let lastVote    = +localStorage.getItem('lastVote')    || 0;

    // ── Timers ────────────────────────────────────────────────────────────────
    function fmtMs(ms) {
        if (ms <= 0) return 'Disponible';
        const s = Math.ceil(ms / 1000);
        const m = Math.floor(s / 60), sec = s % 60;
        return m > 0 ? `${m}m ${sec.toString().padStart(2,'0')}s` : `${sec}s`;
    }

    function updateTimers() {
        const now = Date.now();
        const remPropose = settings.cooldownPropose - (now - lastPropose);
        const remVote    = settings.cooldownVote    - (now - lastVote);

        const boxP = document.getElementById('timer-propose');
        const boxV = document.getElementById('timer-vote');

        if (remPropose > 0) {
            boxP.classList.add('active');
            document.getElementById('timer-propose-val').textContent = fmtMs(remPropose);
            document.getElementById('timer-propose-sub').textContent = 'avant de proposer';
        } else {
            boxP.classList.remove('active');
            document.getElementById('timer-propose-val').textContent = 'Disponible';
            document.getElementById('timer-propose-sub').textContent = '';
        }

        if (remVote > 0) {
            boxV.classList.add('active');
            document.getElementById('timer-vote-val').textContent = fmtMs(remVote);
            document.getElementById('timer-vote-sub').textContent = 'avant de voter';
        } else {
            boxV.classList.remove('active');
            document.getElementById('timer-vote-val').textContent = 'Disponible';
            document.getElementById('timer-vote-sub').textContent = '';
        }
    }
    setInterval(updateTimers, 1000);

    socket.on('settings', (s) => {
        settings = { ...settings, ...s };
        const mP = Math.round(s.cooldownPropose / 60000);
        const mV = Math.round(s.cooldownVote    / 60000);
        document.querySelector('#timer-propose .timer-label').textContent = `⏱ Proposer un son · ${mP} min`;
        document.querySelector('#timer-vote .timer-label').textContent    = `🗳 Voter · ${mV} min`;
        updateTimers();
    });

    let toastTimer;
    function toast(msg, type = 'info') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = `show ${type}`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.className = '', 3200);
    }

    socket.on('init', ({ pending, played, nextTrack }) => {
        playedCount = played.length;
        renderNext(nextTrack);
        updateStats(pending);
        render(pending);
    });

    socket.on('updateList', (tracks) => {
        const nextTrack = tracks.find(t => t.status === 'next') || null;
        renderNext(nextTrack);
        updateStats(tracks);
        render(tracks);
    });

    socket.on('nextUpdate', renderNext);

    socket.on('playedList', (played) => {
        playedCount = played.length;
        document.getElementById('stat-played').textContent = playedCount;
    });

    socket.on('voted', (trackId) => {
        if (!votedTracks.includes(trackId)) {
            votedTracks.push(trackId);
            localStorage.setItem('votedTracks', JSON.stringify(votedTracks));
        }
        lastVote = Date.now();
        localStorage.setItem('lastVote', lastVote);
        updateTimers();
        const btn = document.querySelector(`[data-track-id="${trackId}"]`);
        if (btn) btn.classList.add('voted');
    });

    socket.on('propose_ok', () => {
        lastPropose = Date.now();
        localStorage.setItem('lastPropose', lastPropose);
        updateTimers();
    });

    socket.on('unvoted', (trackId) => {
        votedTracks = votedTracks.filter(id => id !== trackId);
        localStorage.setItem('votedTracks', JSON.stringify(votedTracks));
        const btn = document.querySelector(`[data-track-id="${trackId}"]`);
        if (btn) btn.classList.remove('voted');
        toast('↩ Vote annulé', 'info');
    });

    socket.on('error_msg',   ({ message }) => toast('⚠ ' + message, 'error'));
    socket.on('success_msg', ({ message }) => toast(message, 'success'));

    socket.on('secondPassActivated', () => {
        votedTracks = [];
        localStorage.setItem('votedTracks', '[]');
        lastVote = 0;
        localStorage.setItem('lastVote', '0');
        toast('🌙 2ème passage — tu peux revoter !', 'orange');
        updateTimers();
    });

    function renderNext(track) {
        const banner = document.getElementById('next-banner');
        if (track) {
            document.getElementById('next-title').textContent  = track.title;
            document.getElementById('next-artist').textContent = track.artist;
            banner.classList.add('show');
        } else {
            banner.classList.remove('show');
        }
    }

    function render(tracks) {
        const container = document.getElementById('playlist');
        const pending = tracks.filter(t => t.status !== 'next');
        if (!pending.length) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">🎵</div>
                    <div class="empty-text">Aucun morceau pour l'instant.<br>Sois le premier à en proposer !</div>
                </div>`;
            return;
        }

        container.innerHTML = pending.map((t, i) => {
            const rank    = i + 1;
            const isVoted = votedTracks.includes(t.id);
            const is2nd   = t.pass === 2;

            return `
            <div class="track-card${is2nd ? ' second-pass' : ''}" style="animation-delay:${i * 40}ms">
                <div class="track-rank ${rank <= 3 ? `rank-${rank}` : ''}">
                    ${rank <= 3 ? ['🥇','🥈','🥉'][rank-1] : `#${rank}`}
                </div>
                <div class="track-info">
                    <div class="track-title">${esc(t.title)}</div>
                    <div class="track-meta">
                        <span class="track-artist">${esc(t.artist)}</span>
                    </div>
                </div>
                <button class="vote-btn ${isVoted ? 'voted' : ''}"
                        data-track-id="${t.id}"
                        onclick="toggleVote(${t.id}, ${isVoted})"
                        title="${isVoted ? 'Annuler ton vote' : 'Voter'}">
                    <span class="vote-icon">${isVoted ? '▼' : '▲'}</span>
                    <span class="vote-count">${t.votes}</span>
                </button>
            </div>`;
        }).join('');
    }

    function updateStats(tracks) {
        document.getElementById('stat-pending').textContent = tracks.length;
        const total = tracks.reduce((sum, t) => sum + t.votes, 0);
        document.getElementById('stat-votes').textContent  = total;
        document.getElementById('stat-played').textContent = playedCount;
    }

    function esc(str) {
        return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function propose() {
        const titleEl  = document.getElementById('title');
        const artistEl = document.getElementById('artist');
        const title  = titleEl.value.trim();
        const artist = artistEl.value.trim() || 'Inconnu';
        if (!title) { toast('Indique le titre du morceau 🎶', 'error'); return; }
        socket.emit('propose', { deviceId, title, artist });
        titleEl.value = ''; artistEl.value = '';
    }

    function toggleVote(trackId, isVoted) {
        if (isVoted) {
            socket.emit('unvote', { deviceId, trackId });
        } else {
            socket.emit('vote', { deviceId, trackId });
        }
    }

    document.getElementById('title').addEventListener('keydown',  e => { if (e.key === 'Enter') document.getElementById('artist').focus(); });
    document.getElementById('artist').addEventListener('keydown', e => { if (e.key === 'Enter') propose(); });
</script>
